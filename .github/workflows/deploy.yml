name: Deploy production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
      VITE_API_URL: ${{ vars.VITE_API_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test API
        run: npm -w apps/api run test

      - name: Test database package
        run: npm -w packages/db run test

      - name: Type-check API
        run: npx tsc -p apps/api/tsconfig.json --noEmit

      - name: Build frontend
        run: npm -w apps/web run build

      - name: Apply D1 migrations
        run: npm -w apps/api run db:migrate:remote

      - name: Deploy API Worker
        run: npm -w apps/api run deploy

      - name: Deploy frontend to Pages
        run: npm -w apps/web run deploy
