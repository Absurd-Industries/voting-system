name = "cfp-voting-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "cfp-voting"
database_id = "local-db"

[vars]
# Update ALLOWED_ORIGIN to your Pages domain before production deployment
# e.g. https://cfp-voting.pages.dev
ALLOWED_ORIGIN = "http://localhost:5173"
